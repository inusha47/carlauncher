<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DECK — Car Launcher</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050805;--surface:#0a0f0a;--panel:#0e150e;--border:#162016;
  --text:#a8c8a8;--muted:#3a5a3a;--amber:#ffb700;--red:#ff3d3d;
  --th-hi:#00ff41;--th-mid:#00cc33;--th-lo:#003a10;--th-glow:rgba(0,255,65,0.6);
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
  font-family:'Courier New','Lucida Console',monospace;overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
#root{display:grid;grid-template-rows:44px 1fr 290px;height:100vh}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.logo{font-size:18px;font-weight:900;letter-spacing:6px;color:var(--th-hi);text-shadow:0 0 10px var(--th-glow)}
.logo em{color:var(--muted);font-style:normal}
#clock{font-size:16px;letter-spacing:3px;color:var(--th-hi)}
.spill{display:flex;align-items:center;gap:6px;padding:3px 10px;
  border:1px solid var(--border);border-radius:20px;font-size:9px;letter-spacing:2px;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.sdot.on{background:var(--th-hi);box-shadow:0 0 6px var(--th-hi);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
#main{display:grid;grid-template-columns:150px 1fr 1fr;background:var(--border);gap:1px;overflow:hidden}

/* QUICK SLOTS */
#slots{background:var(--surface);display:flex;flex-direction:column;padding:10px 8px;gap:7px;overflow-y:auto}
.shdr{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;
  padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:2px}
.slot-btn{position:relative;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:10px 6px;background:var(--panel);
  border:1px solid var(--border);border-radius:8px;cursor:pointer;min-height:62px;
  flex-shrink:0;transition:border-color .15s,box-shadow .15s;text-decoration:none;color:inherit}
.slot-btn:active{border-color:var(--th-hi);box-shadow:0 0 10px var(--th-glow)}
.slot-icon{font-size:22px;line-height:1}
.slot-name{font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.slot-edit{position:absolute;top:3px;right:4px;font-size:9px;color:var(--muted);
  cursor:pointer;opacity:0;background:none;border:none;padding:2px 4px;font-family:inherit}
.slot-btn:hover .slot-edit,.slot-btn:active .slot-edit{opacity:1}

/* APP PANELS */
.app-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.ap-header{display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.ap-title{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.ap-hint{font-size:8px;color:var(--muted)}
.ap-body{flex:1;overflow-y:auto;padding:8px;display:grid;
  grid-template-columns:1fr 1fr;gap:7px;align-content:start}
.ap-body::-webkit-scrollbar{display:none}

/* APP CARDS */
.app-card{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:10px 6px;background:var(--panel);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;text-decoration:none;color:inherit;
  transition:border-color .2s,box-shadow .2s;min-height:72px}
.app-card:active,.app-card:hover{border-color:var(--th-hi);box-shadow:0 0 12px var(--th-glow)}
.app-card.full{grid-column:1/-1;flex-direction:row;gap:12px;padding:12px 14px;min-height:56px}
.ac-icon{font-size:26px;line-height:1}
.app-card.full .ac-icon{font-size:30px}
.ac-info{display:flex;flex-direction:column;gap:2px}
.ac-name{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.ac-sub{font-size:8px;color:var(--muted);letter-spacing:1px}
.ac-badge{display:inline-block;margin-top:3px;padding:1px 5px;border-radius:8px;
  font-size:7px;letter-spacing:1px;text-transform:uppercase;
  background:rgba(0,255,65,.1);border:1px solid var(--th-hi);color:var(--th-hi)}

/* VIZ ZONE */
#viz-zone{background:var(--surface);border-top:1px solid var(--border);
  display:grid;grid-template-columns:150px 1fr 88px;overflow:hidden}
.viz-left{display:flex;flex-direction:column;padding:8px 10px;gap:6px;
  border-right:1px solid var(--border);overflow-y:auto}
.elbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.eq-select{background:var(--panel);border:1px solid var(--border);color:var(--text);
  font-family:'Courier New',monospace;font-size:9px;padding:4px 6px;border-radius:5px;
  cursor:pointer;outline:none;width:100%}
.eq-select:focus{border-color:var(--th-hi)}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.tswatch{padding:3px 4px;font-size:8px;border-radius:4px;
  border:1px solid var(--border);background:var(--panel);color:var(--muted);
  cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.tswatch.active{border-color:var(--th-hi);color:var(--th-hi);
  box-shadow:0 0 6px var(--th-glow);background:rgba(0,0,0,.4)}
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.vizmode{padding:3px 4px;font-size:8px;text-transform:uppercase;
  border-radius:4px;border:1px solid var(--border);background:var(--panel);
  color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.vizmode.active{border-color:var(--th-hi);color:var(--th-hi);
  background:rgba(0,0,0,.4);box-shadow:0 0 5px var(--th-glow)}
.srow{display:flex;align-items:center;gap:5px}
.srow span{font-size:8px;color:var(--th-hi);min-width:28px;text-align:right}
input[type=range].gs{-webkit-appearance:none;flex:1;height:3px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range].gs::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--th-hi);cursor:pointer;box-shadow:0 0 8px var(--th-glow)}

/* VIZ CANVAS */
#viz-center{display:flex;flex-direction:column;padding:6px 4px 4px;gap:3px;overflow:hidden}
#viz-toprow{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
#viz-toprow span{font-size:8px;letter-spacing:2px;color:var(--muted)}
#viz-canvas{flex:1;display:block;width:100%;border:1px solid var(--border);border-radius:3px;cursor:pointer}

/* VU */
.viz-right{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 10px;border-left:1px solid var(--border)}
.vu-col{display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.vulbl{font-size:8px;letter-spacing:2px;color:var(--muted)}
.vutrack{width:16px;flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.vufill{width:100%;border-radius:2px;transition:height .05s linear}
.vudb{font-size:7px;color:var(--muted)}

/* AUDIO INIT OVERLAY on canvas */
#audio-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:rgba(5,8,5,.75);cursor:pointer;border-radius:3px;z-index:5}
#audio-overlay .ao-icon{font-size:32px}
#audio-overlay .ao-txt{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--th-hi)}
#audio-overlay .ao-sub{font-size:8px;color:var(--muted);text-align:center;max-width:160px}
#viz-wrap{position:relative;flex:1;display:flex;flex-direction:column}

/* WIN PANELS */
.win-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.win-header{display:flex;align-items:center;padding:5px 8px;background:var(--panel);
  border-bottom:1px solid var(--border);flex-shrink:0;gap:5px;overflow-x:auto}
.win-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.pill-row{display:flex;gap:4px;overflow-x:auto}
.pill-row::-webkit-scrollbar{display:none}
.app-pill{padding:3px 8px;font-size:8px;letter-spacing:1px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.app-pill:active,.app-pill.active{border-color:var(--th-hi);color:var(--th-hi);
  background:rgba(0,255,65,.07);box-shadow:0 0 8px var(--th-glow)}
.win-body{flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
iframe.wf{width:100%;height:100%;border:none}
.win-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted)}
.win-ph .phi{font-size:28px;opacity:.2}
.win-ph p{font-size:8px;letter-spacing:2px;text-transform:uppercase}
/* Native app launch card inside window */
.native-card{display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:20px;text-align:center}
.native-card .nc-icon{font-size:40px}
.native-card .nc-name{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--th-hi)}
.native-card .nc-sub{font-size:9px;color:var(--muted);letter-spacing:1px}
.nc-btn{display:inline-block;margin-top:6px;padding:8px 18px;
  border:1px solid var(--th-hi);border-radius:6px;
  background:rgba(0,255,65,.08);color:var(--th-hi);
  font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;text-decoration:none;cursor:pointer;
  transition:all .15s;box-shadow:0 0 8px var(--th-glow)}
.nc-btn:active{box-shadow:0 0 16px var(--th-glow)}
/* MODAL */
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  z-index:200;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--th-hi);
  box-shadow:0 0 30px var(--th-glow);border-radius:10px;
  padding:18px;min-width:290px;max-width:360px;width:90%}
.modal h3{font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--th-hi);margin-bottom:12px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.mf label{font-size:8px;letter-spacing:2px;color:var(--muted)}
.mf input{background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:'Courier New',monospace;font-size:11px;padding:6px 8px;border-radius:5px;outline:none;width:100%}
.mf input:focus{border-color:var(--th-hi)}
.egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:10px}
.ep{font-size:18px;text-align:center;cursor:pointer;padding:2px;border-radius:4px;
  border:1px solid transparent;transition:all .15s}
.ep.sel{border-color:var(--th-hi);background:rgba(0,255,65,.1)}
.mbtns{display:flex;gap:7px;justify-content:flex-end}
.mbtn{padding:6px 14px;border-radius:5px;border:none;cursor:pointer;
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;transition:all .15s}
.mok{background:var(--th-hi);color:#000;font-weight:700}
.mno{background:transparent;border:1px solid var(--border);color:var(--muted)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="root">

<div id="topbar">
  <div class="logo">DE<em>::</em>CK</div>
  <div id="clock">--:--:--</div>
  <div class="spill"><div class="sdot" id="sdot"></div><span id="sstat">READY</span></div>
</div>

<div id="main">
  <div id="slots"><div class="shdr">Quick Launch</div></div>

  <!-- WINDOW A -->
  <div class="win-panel">
    <div class="win-header">
      <span class="win-lbl">WIN A</span>
      <div class="pill-row" id="pillsA"></div>
    </div>
    <div class="win-body" id="bodyA">
      <div class="win-ph"><div class="phi">◻</div><p>Select app above</p></div>
    </div>
  </div>

  <!-- WINDOW B -->
  <div class="win-panel">
    <div class="win-header">
      <span class="win-lbl">WIN B</span>
      <div class="pill-row" id="pillsB"></div>
    </div>
    <div class="win-body" id="bodyB">
      <div class="win-ph"><div class="phi">◻</div><p>Select app above</p></div>
    </div>
  </div>
</div>

<div id="viz-zone">
  <div class="viz-left">
    <div class="elbl">Source</div>
    <select class="eq-select" id="srcSel">
      <option value="stereo">Stereo Out (active)</option>
      <option value="mic">Microphone (fallback)</option>
    </select>
    <div class="elbl">Theme</div>
    <div class="tgrid" id="themeGrid"></div>
    <div class="elbl">Mode</div>
    <div class="mgrid" id="modeGrid"></div>
    <div class="elbl">Sensitivity</div>
    <div class="srow">
      <input type="range" class="gs" id="sensSlider" min="1" max="10" step=".1" value="4">
      <span id="sensLbl">4.0x</span>
    </div>
  </div>

  <div id="viz-center">
    <div id="viz-toprow">
      <span id="viz-mode-lbl">BLOCKS VIZ</span>
      <span id="viz-src-lbl">TAP VISUALIZER TO START AUDIO</span>
    </div>
    <div id="viz-wrap">
      <canvas id="viz-canvas"></canvas>
      <div id="audio-overlay">
        <div class="ao-icon">🎧</div>
        <div class="ao-txt">Tap to activate audio</div>
        <div class="ao-sub">Stereo output capture via browser share prompt</div>
      </div>
    </div>
  </div>

  <div class="viz-right">
    <div class="vu-col">
      <div class="vulbl">L</div>
      <div class="vutrack"><div class="vufill" id="vuL" style="height:0%"></div></div>
      <div class="vudb" id="vuLdb">—</div>
    </div>
    <div class="vu-col">
      <div class="vulbl">R</div>
      <div class="vutrack"><div class="vufill" id="vuR" style="height:0%"></div></div>
      <div class="vudb" id="vuRdb">—</div>
    </div>
  </div>
</div>

</div>

<!-- MODAL -->
<div id="modal-ov">
  <div class="modal">
    <h3>Edit Slot</h3>
    <div class="mf"><label>Name</label><input type="text" id="m-name"></div>
    <div class="mf"><label>URL / App Link</label><input type="text" id="m-url" placeholder="https:// or waze:// or intent://"></div>
    <div class="mf"><label>Icon</label></div>
    <div class="egrid" id="egrid"></div>
    <div class="mbtns">
      <button class="mbtn mno" id="m-cancel">Cancel</button>
      <button class="mbtn mok" id="m-save">Save</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════
//  DATA
// ═══════════════════════
// APPS for windows
// type='embed'  — real iframe, confirmed embeddable
// type='native' — Android app only, no web version; shows launch card
const WIN_APPS=[

  // ══ EMBEDDABLE — load live inside the window ══

  // Waze Live Map — official Google embed API (embed.waze.com)
  {id:'waze',    name:'Waze',      icon:'🚗', type:'embed',
   src:'https://embed.waze.com/iframe?zoom=13&lat=-31.9505&lon=115.8605&pin=0',
   hint:'Waze Live Map — Perth'},

  // OpenStreetMap — no X-Frame-Options, always embeds
  {id:'osm',     name:'Map',       icon:'🗺️', type:'embed',
   src:'https://www.openstreetmap.org/export/embed.html?bbox=115.6,-32.1,116.1,-31.8&layer=mapnik',
   hint:'OpenStreetMap — Perth'},

  // Windy official embed — confirmed embeddable
  {id:'windy',   name:'Windy',     icon:'🌤️', type:'embed',
   src:'https://embed.windy.com/embed2.html?lat=-31.95&lon=115.86&zoom=8&level=surface&overlay=wind&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1',
   hint:'Live wind & weather — Perth'},

  // YouTube embed
  {id:'yt',      name:'YouTube',   icon:'▶️', type:'embed',
   src:'https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=0',
   hint:'YouTube — lofi music'},

  // Radio Garden embed
  {id:'radio',   name:'Radio',     icon:'📻', type:'embed',
   src:'https://radio.garden/listen/6mix/VH6lbHH8/embed',
   hint:'Radio Garden — 6MIX Perth'},

  // ══ NATIVE ANDROID APPS — no web version, launch card only ══

  // Speed Camera Map — Leaflet.js map rendered directly in the window,
  // pulling WA fixed speed camera locations from OpenStreetMap Overpass API.
  {id:'speedcam', name:'SpeedCams', icon:'📷', type:'builtin',
   hint:'Fixed & community speed cameras — Perth WA'},

  {id:'spotify', name:'Spotify',   icon:'🎵', type:'native',
   deeplink:'spotify:',
   fallback:'https://open.spotify.com',
   hint:'Tap to open Spotify'},

  {id:'phone',   name:'Phone',     icon:'📞', type:'native',
   deeplink:'intent:#Intent;action=android.intent.action.DIAL;end',
   fallback:'', hint:'Tap to open Dialler'},

  {id:'bt',      name:'Bluetooth', icon:'🔵', type:'native',
   deeplink:'intent:#Intent;action=android.settings.BLUETOOTH_SETTINGS;end',
   fallback:'', hint:'Tap to open Bluetooth settings'},
];
const DEFAULT_SLOTS=[
  {name:'Radarbot',icon:'📡',url:'intent://open#Intent;scheme=radarbot;package=com.radarbot.radarbot;end'},
  {name:'Waze',    icon:'🚗',url:'waze://'},
  {name:'Music',   icon:'🎵',url:'spotify:'},
  {name:'Maps',    icon:'🗺️',url:'https://www.openstreetmap.org'},
  {name:'Settings',icon:'⚙️',url:'intent:#Intent;action=android.settings.SETTINGS;end'},
];
const EMOJIS=['📡','🚗','🦁','🎵','🗺️','📞','📷','⚙️','▶️','🌤️','📻','🔋','💡','🎙️','🛞','🧭','📱','🔧','🌐','⚡','📶','🔴','🔵','🟢','🟡','🟠','🎮','🏎️'];
const THEMES={
  Matrix: {hi:'#00ff41',mid:'#00cc33',lo:'#003a10',glow:'rgba(0,255,65,.6)'},
  Cyan:   {hi:'#00d4ff',mid:'#0099cc',lo:'#003d55',glow:'rgba(0,212,255,.6)'},
  Amber:  {hi:'#ffb700',mid:'#cc8800',lo:'#553a00',glow:'rgba(255,183,0,.6)'},
  Plasma: {hi:'#ff00ff',mid:'#cc00cc',lo:'#550055',glow:'rgba(255,0,255,.6)'},
  Rainbow:{hi:'RAINBOW',mid:'',lo:'',glow:'rgba(255,255,255,.3)'},
  Inferno:{hi:'#ff4400',mid:'#cc2200',lo:'#550a00',glow:'rgba(255,68,0,.6)'},
};
const VIZ_MODES=['Blocks','Bars','Wave','Mirror','Circle','Scope'];

// ═══════════════════════
//  STATE
// ═══════════════════════
let slots=JSON.parse(localStorage.getItem('deck-s6')||'null')||DEFAULT_SLOTS;
let activeTheme='Matrix';
let vizMode='Blocks';
let sensitivity=4;
let editSlot=null,selEmoji='📡';
let audioCtx=null,analyserL=null,analyserR=null;
let audioReady=false;
let demoPhase=0;
let audioSource='stereo';

// ═══════════════════════
//  CLOCK
// ═══════════════════════
(function tick(){
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('en-AU',{hour12:false});
  setTimeout(tick,1000);
})();

// ═══════════════════════
//  THEME
// ═══════════════════════
function applyTheme(n){
  activeTheme=n;
  const t=THEMES[n];
  const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  const r=document.documentElement.style;
  r.setProperty('--th-hi',hi);
  r.setProperty('--th-mid',t.mid||'#00cc33');
  r.setProperty('--th-lo',t.lo||'#003a10');
  r.setProperty('--th-glow',t.glow);
  renderThemeGrid();
}
function renderThemeGrid(){
  const g=document.getElementById('themeGrid');g.innerHTML='';
  Object.keys(THEMES).forEach(n=>{
    const t=THEMES[n];
    const b=document.createElement('button');
    b.className='tswatch'+(n===activeTheme?' active':'');
    b.textContent=n;
    b.style.setProperty('--th-hi',t.hi==='RAINBOW'?'#ff88ff':t.hi);
    b.style.setProperty('--th-glow',t.glow);
    b.onclick=()=>applyTheme(n);
    g.appendChild(b);
  });
}

// ═══════════════════════
//  VIZ MODES
// ═══════════════════════
function renderModeGrid(){
  const g=document.getElementById('modeGrid');g.innerHTML='';
  VIZ_MODES.forEach(m=>{
    const b=document.createElement('button');
    b.className='vizmode'+(m===vizMode?' active':'');
    b.textContent=m;
    b.onclick=()=>{vizMode=m;renderModeGrid();
      document.getElementById('viz-mode-lbl').textContent=m.toUpperCase()+' VIZ';};
    g.appendChild(b);
  });
}

// ═══════════════════════

function setWin(win,app){

  document.querySelectorAll('#pills'+win+' .app-pill').forEach(p=>
    p.classList.toggle('active',p.dataset.id===app.id));

    f.className='wf';
    f.src=app.src;
    f.setAttribute('allowfullscreen','');
    f.setAttribute('allow','geolocation; autoplay');

    // Native Android app — no embeddable web version exists
    const div=document.createElement('div');
    div.className='native-card';
    const dl=app.deeplink||app.fallback||'#';
    div.innerHTML=`
      <div class="nc-icon">${app.icon}</div>
      <div class="nc-name">${app.name}</div>
      <div class="nc-sub">${app.hint}</div>
      <a class="nc-btn" href="${dl}" rel="noopener">▶ Launch ${app.name}</a>

        rel="noopener" style="margin-top:4px;font-size:8px;opacity:.6">

    body.appendChild(div);
  }
}

// ═══════════════════════
//  AUDIO ENGINE
//  GitHub Pages = https:// = getDisplayMedia works
// ═══════════════════════
async function initAudio(){
  if(audioReady)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();

    // Build stereo analyser chain
    const splitter=audioCtx.createChannelSplitter(2);
    const merger=audioCtx.createChannelMerger(2);
    analyserL=audioCtx.createAnalyser();
    analyserR=audioCtx.createAnalyser();
    analyserL.fftSize=2048; analyserL.smoothingTimeConstant=0.8;
    analyserR.fftSize=2048; analyserR.smoothingTimeConstant=0.8;

    let stream;
    if(audioSource==='stereo'){
      // Android Brave: getDisplayMedia requires video:true — audio-only throws NotSupportedError.
      // We request video (discarded immediately) just to satisfy the API, then only use audio track.
      let rawStream=await navigator.mediaDevices.getDisplayMedia({
        video:{width:1,height:1,frameRate:1},
        audio:{
          echoCancellation:false,
          noiseSuppression:false,
          autoGainControl:false,
          channelCount:2,
          sampleRate:48000,
          suppressLocalAudioPlayback:false
        },
        systemAudio:'include',
        surfaceSwitching:'exclude',
        selfBrowserSurface:'include',
        monitorTypeSurfaces:'include'
      });
      // Stop video tracks immediately — we only need audio
      rawStream.getVideoTracks().forEach(t=>t.stop());
      // Check we actually got audio
      const audioTracks=rawStream.getAudioTracks();
      if(audioTracks.length===0){
        throw new Error('No audio track returned — select "Share device audio" in the prompt');
      }
      // Build a new stream with only the audio track
      stream=new MediaStream(audioTracks);
      document.getElementById('viz-src-lbl').textContent='STEREO OUTPUT ACTIVE';
    } else {
      // Mic fallback — works on file:// and https://
      stream=await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,channelCount:2},
        video:false
      });
      document.getElementById('viz-src-lbl').textContent='MIC ACTIVE';
    }

    const src=audioCtx.createMediaStreamSource(stream);

    // Route: source → splitter → individual analysers → merger → destination (silent)
    src.connect(splitter);
    splitter.connect(analyserL,0);
    splitter.connect(analyserR,1);
    // Don't connect to destination — we don't want to re-output (avoid feedback)

    // Handle stream ending (user cancels share)
    stream.getAudioTracks()[0].onended=()=>{
      audioReady=false;
      analyserL=null;analyserR=null;
      if(audioCtx){audioCtx.close();audioCtx=null;}
      document.getElementById('audio-overlay').style.display='flex';
      document.getElementById('sdot').classList.remove('on');
      document.getElementById('sstat').textContent='READY';
      document.getElementById('viz-src-lbl').textContent='SHARE ENDED — TAP TO RESTART';
    };

    audioReady=true;
    document.getElementById('audio-overlay').style.display='none';
    document.getElementById('sdot').classList.add('on');
    document.getElementById('sstat').textContent=audioSource==='stereo'?'STEREO':'MIC';

  }catch(e){
    console.error('Audio init failed:',e.name, e.message);
    let msg='TAP TO RETRY';
    if(e.name==='NotAllowedError')msg='PERMISSION DENIED — TAP TO RETRY';
    else if(e.name==='NotSupportedError')msg='NOT SUPPORTED ON THIS BROWSER';
    else if(e.name==='NotFoundError')msg='NO AUDIO DEVICE FOUND';
    else if(e.message&&e.message.includes('audio track'))msg='NO AUDIO SHARED — ENABLE DEVICE AUDIO IN PROMPT';
    document.getElementById('viz-src-lbl').textContent=msg;
    document.getElementById('audio-overlay').querySelector('.ao-sub').textContent=
      e.name+': '+e.message.slice(0,80);
    audioReady=false;
    if(audioCtx){audioCtx.close();audioCtx=null;}
  }
}

// Tap overlay or canvas to start
document.getElementById('audio-overlay').onclick=()=>initAudio();
document.getElementById('viz-canvas').onclick=()=>{if(!audioReady)initAudio();};

// ═══════════════════════
//  VISUALIZER DRAW LOOP
// ═══════════════════════
const cvs=document.getElementById('viz-canvas');
const ctx=cvs.getContext('2d');

function themeCol(i,total){
  const t=THEMES[activeTheme];
  if(t.hi==='RAINBOW'){
    const h=Math.round((i/total)*300);
    return{hi:`hsl(${h},100%,55%)`,glow:`hsl(${h},100%,70%)`,lo:`hsl(${h},50%,8%)`};
  }
  return{hi:t.hi,glow:t.hi,lo:t.lo||'#003a10'};
}

function getAudioData(){
  if(audioReady&&analyserL&&analyserR){
    const fL=new Uint8Array(analyserL.frequencyBinCount);
    const fR=new Uint8Array(analyserR.frequencyBinCount);
    const tL=new Uint8Array(analyserL.fftSize);
    analyserL.getByteFrequencyData(fL);
    analyserR.getByteFrequencyData(fR);
    analyserL.getByteTimeDomainData(tL);
    // Merge L+R freq for mono display, keep separate for VU
    const freq=new Uint8Array(fL.length);
    for(let i=0;i<fL.length;i++)freq[i]=Math.round((fL[i]+fR[i])/2);
    return{freq,time:tL,freqL:fL,freqR:fR,live:true};
  }
  // Animated demo — runs while waiting for audio
  demoPhase+=0.03;
  const flen=512,tlen=1024;
  const freq=new Uint8Array(flen);
  const time=new Uint8Array(tlen);
  for(let i=0;i<flen;i++){
    const env=Math.max(0,190-i*0.3);
    freq[i]=Math.max(0,Math.min(255,
      env*0.55+Math.sin(demoPhase*1.8+i*0.09)*env*0.28
      +Math.sin(demoPhase*3.3+i*0.05)*env*0.17+Math.random()*14));
  }
  for(let i=0;i<tlen;i++){
    time[i]=128+Math.sin(demoPhase*2.6+i*0.04)*52
      +Math.sin(demoPhase*5.8+i*0.02)*16+Math.random()*4;
  }
  return{freq,time,freqL:freq,freqR:freq,live:false};
}

function drawFrame(){
  requestAnimationFrame(drawFrame);
  const W=cvs.width=cvs.offsetWidth||600;
  const H=cvs.height=cvs.offsetHeight||200;
  ctx.clearRect(0,0,W,H);
  const d=getAudioData();
  switch(vizMode){
    case'Blocks': drawBlocks(W,H,d.freq);break;
    case'Bars':   drawBars(W,H,d.freq);break;
    case'Wave':   drawWave(W,H,d.time);break;
    case'Mirror': drawMirror(W,H,d.freq);break;
    case'Circle': drawCircle(W,H,d.freq);break;
    case'Scope':  drawScope(W,H,d.time);break;
  }
  updateVU(d.freqL,d.freqR);
}

function drawBlocks(W,H,freq){
  const bins=20;
  const step=Math.floor(freq.length*0.7/bins);
  const bw=W/bins,BH=5,BG=2,BS=BH+BG;
  const total=Math.floor((H-4)/BS);
  for(let i=0;i<bins;i++){
    let s=0;for(let j=0;j<step;j++)s+=freq[i*step+j];
    const v=Math.min(1,(s/step/255)*sensitivity*0.65);
    const lit=Math.round(v*total);
    const col=themeCol(i,bins);
    for(let b=0;b<total;b++){
      const by=H-4-(b+1)*BS;
      if(b<lit){
        const frac=b/total;
        ctx.globalAlpha=0.35+frac*0.65;
        ctx.shadowColor=col.glow;ctx.shadowBlur=b>lit*0.75?9:2;
        ctx.fillStyle=col.hi;
        ctx.fillRect(i*bw+1.5,by,bw-3,BH);
        ctx.shadowBlur=0;ctx.globalAlpha=1;
      }else{
        ctx.fillStyle=col.lo;ctx.globalAlpha=0.2;
        ctx.fillRect(i*bw+1.5,by,bw-3,BH);
        ctx.globalAlpha=1;
      }
    }
    if(lit>0){
      const py=H-4-(lit+1)*BS;
      if(py>0){
        ctx.fillStyle=col.hi;ctx.shadowColor=col.glow;ctx.shadowBlur=14;
        ctx.fillRect(i*bw+1.5,py,bw-3,BH);ctx.shadowBlur=0;
      }
    }
  }
}

function drawBars(W,H,freq){
  const bins=20,step=Math.floor(freq.length*0.7/bins),bw=W/bins;
  for(let i=0;i<bins;i++){
    let s=0;for(let j=0;j<step;j++)s+=freq[i*step+j];
    const v=Math.min(1,(s/step/255)*sensitivity*0.65);
    const h=Math.max(2,v*(H-4));
    const col=themeCol(i,bins);
    const t=THEMES[activeTheme];
    const grad=ctx.createLinearGradient(0,H-h,0,H);
    grad.addColorStop(0,col.hi);grad.addColorStop(1,t.lo||'#003a10');
    ctx.fillStyle=grad;ctx.shadowColor=col.glow;ctx.shadowBlur=3;
    ctx.fillRect(i*bw+1,H-h,bw-2,h);ctx.shadowBlur=0;
  }
}

function drawWave(W,H,time){
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  ctx.beginPath();ctx.strokeStyle=hi;ctx.lineWidth=2;
  ctx.shadowColor=hi;ctx.shadowBlur=8;
  const step=W/time.length;
  for(let i=0;i<time.length;i++){
    const y=((time[i]-128)/128)*(H/2*0.8*Math.min(sensitivity,6)/4)+H/2;
    i===0?ctx.moveTo(0,y):ctx.lineTo(i*step,y);
  }
  ctx.stroke();ctx.shadowBlur=0;
  ctx.lineTo(W,H/2);ctx.lineTo(0,H/2);ctx.closePath();
  ctx.fillStyle=hi+'18';ctx.fill();
}

function drawMirror(W,H,freq){
  const bins=20,step=Math.floor(freq.length*0.7/bins),bw=W/bins,mid=H/2;
  for(let i=0;i<bins;i++){
    let s=0;for(let j=0;j<step;j++)s+=freq[i*step+j];
    const v=Math.min(1,(s/step/255)*sensitivity*0.65);
    const h=Math.max(2,v*(mid-4));
    const col=themeCol(i,bins);
    const lo=THEMES[activeTheme].lo||'#003a10';
    const grad=ctx.createLinearGradient(0,mid-h,0,mid+h);
    grad.addColorStop(0,lo);grad.addColorStop(0.5,col.hi);grad.addColorStop(1,lo);
    ctx.fillStyle=grad;ctx.shadowColor=col.glow;ctx.shadowBlur=3;
    ctx.fillRect(i*bw+1,mid-h,bw-2,h*2);ctx.shadowBlur=0;
  }
  const hi=(THEMES[activeTheme].hi==='RAINBOW')?'#00ff41':THEMES[activeTheme].hi;
  ctx.strokeStyle=hi+'33';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,mid);ctx.lineTo(W,mid);ctx.stroke();
}

function drawCircle(W,H,freq){
  const cx2=W/2,cy2=H/2,R=Math.min(W,H)*0.26;
  const hi=(THEMES[activeTheme].hi==='RAINBOW')?'#00ff41':THEMES[activeTheme].hi;
  ctx.beginPath();ctx.arc(cx2,cy2,R,0,Math.PI*2);
  ctx.strokeStyle=hi+'33';ctx.lineWidth=1;ctx.stroke();
  const bins=20,step=Math.floor(freq.length*0.7/bins);
  for(let i=0;i<bins;i++){
    let s=0;for(let j=0;j<step;j++)s+=freq[i*step+j];
    const v=Math.min(1,(s/step/255)*sensitivity*0.65);
    const ang=(i/bins)*Math.PI*2-Math.PI/2;
    const outer=R+v*R*0.85;
    const col=themeCol(i,bins);
    ctx.beginPath();
    ctx.moveTo(cx2+Math.cos(ang)*R,cy2+Math.sin(ang)*R);
    ctx.lineTo(cx2+Math.cos(ang)*outer,cy2+Math.sin(ang)*outer);
    ctx.strokeStyle=col.hi;ctx.lineWidth=2;
    ctx.shadowColor=col.glow;ctx.shadowBlur=4;
    ctx.stroke();ctx.shadowBlur=0;
  }
}

function drawScope(W,H,time){
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  ctx.strokeStyle=hi+'18';ctx.lineWidth=1;
  [0.25,0.5,0.75].forEach(f=>{
    ctx.beginPath();ctx.moveTo(0,f*H);ctx.lineTo(W,f*H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(f*W,0);ctx.lineTo(f*W,H);ctx.stroke();
  });
  ctx.beginPath();ctx.strokeStyle=hi;ctx.lineWidth=1.5;
  ctx.shadowColor=hi;ctx.shadowBlur=6;
  const step=W/time.length;
  for(let i=0;i<time.length;i++){
    const y=((time[i]-128)/128)*(H/2*0.8*Math.min(sensitivity,6)/4)+H/2;
    i===0?ctx.moveTo(0,y):ctx.lineTo(i*step,y);
  }
  ctx.stroke();ctx.shadowBlur=0;
}

function updateVU(freqL,freqR){
  let sL=0,sR=0;
  for(let i=0;i<freqL.length;i++)sL+=freqL[i]*freqL[i];
  for(let i=0;i<freqR.length;i++)sR+=freqR[i]*freqR[i];
  const rL=Math.sqrt(sL/freqL.length)/255;
  const rR=Math.sqrt(sR/freqR.length)/255;
  const pL=Math.min(100,rL*sensitivity*160);
  const pR=Math.min(100,rR*sensitivity*160);
  const hi=(THEMES[activeTheme].hi==='RAINBOW')?'#00ff41':THEMES[activeTheme].hi;
  const mid=THEMES[activeTheme].mid||'#ffb700';
  function vc(p){if(p>90)return'#ff3d3d';if(p>70)return mid;return hi;}
  const vL=document.getElementById('vuL');vL.style.height=pL+'%';vL.style.background=vc(pL);
  const vR=document.getElementById('vuR');vR.style.height=pR+'%';vR.style.background=vc(pR);
  const dL=rL>1e-4?Math.max(-60,20*Math.log10(rL)):-Infinity;
  const dR=rR>1e-4?Math.max(-60,20*Math.log10(rR)):-Infinity;
  document.getElementById('vuLdb').textContent=isFinite(dL)?dL.toFixed(0):'—';
  document.getElementById('vuRdb').textContent=isFinite(dR)?dR.toFixed(0):'—';
}

// ═══════════════════════
//  SPEED CAMERA MAP (Leaflet + OSM Overpass)
// ═══════════════════════
function buildSpeedCamMap(container){
  container.innerHTML='';
  container.style.position='relative';

  // Inject Leaflet CSS + JS dynamically
  if(!document.getElementById('leaflet-css')){
    const lc=document.createElement('link');
    lc.id='leaflet-css';lc.rel='stylesheet';
    lc.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(lc);
  }

  const mapDiv=document.createElement('div');
  mapDiv.style.cssText='width:100%;height:100%;';
  container.appendChild(mapDiv);

  // Status bar
  const status=document.createElement('div');
  status.style.cssText='position:absolute;bottom:8px;left:50%;transform:translateX(-50%);'
    +'background:rgba(5,8,5,.85);border:1px solid #162016;border-radius:4px;'
    +'padding:4px 10px;font-size:8px;letter-spacing:2px;color:#00ff41;z-index:1000;pointer-events:none;';
  status.textContent='LOADING CAMERAS...';
  container.appendChild(status);

  function loadLeafletAndInit(){
    if(window.L){initMap();return;}
    const ls=document.createElement('script');
    ls.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    ls.onload=initMap;
    document.head.appendChild(ls);
  }

  function initMap(){
    const map=L.map(mapDiv,{zoomControl:true,attributionControl:false}).setView([-31.9505,115.8605],12);

    // Dark tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      maxZoom:19,subdomains:'abcd'
    }).addTo(map);

    // Camera icon
    const camIcon=L.divIcon({
      html:'<div style="background:#ff3d3d;border:2px solid #ff8080;border-radius:50%;width:12px;height:12px;box-shadow:0 0 8px #ff3d3d"></div>',
      className:'',iconSize:[12,12],iconAnchor:[6,6]
    });
    const policeIcon=L.divIcon({
      html:'<div style="background:#ffb700;border:2px solid #ffe080;border-radius:3px;width:12px;height:12px;box-shadow:0 0 8px #ffb700"></div>',
      className:'',iconSize:[12,12],iconAnchor:[6,6]
    });
    const mobileIcon=L.divIcon({
      html:'<div style="background:#ff4400;border:2px solid #ff8844;border-radius:2px;width:10px;height:10px;box-shadow:0 0 6px #ff4400"></div>',
      className:'',iconSize:[10,10],iconAnchor:[5,5]
    });

    // Fetch speed cameras from OSM Overpass API for Perth metro area
    const overpassQuery=`[out:json][timeout:25];
(
  node["highway"="speed_camera"](-33.0,115.4,-31.0,116.5);
  node["man_made"="surveillance"]["surveillance:type"="camera"]["camera:type"="speed"](-33.0,115.4,-31.0,116.5);
  node["enforcement"="speed_camera"](-33.0,115.4,-31.0,116.5);
  node["highway"="speed_camera"](-33.0,115.4,-31.0,116.5);
);
out body;`;
    const url='https://overpass-api.de/api/interpreter?data='+encodeURIComponent(overpassQuery);

    fetch(url)
      .then(r=>r.json())
      .then(data=>{
        let count=0;
        data.elements.forEach(el=>{
          if(el.lat&&el.lon){
            const t=el.tags||{};
            const name=t.name||t['name:en']||t.ref||'Speed Camera';
            const maxspeed=t.maxspeed||'';
            const direction=t.direction||t['camera:direction']||'';
            L.marker([el.lat,el.lon],{icon:camIcon})
              .addTo(map)
              .bindPopup(`<b style="color:#ff3d3d">📷 ${name}</b><br>`
                +(maxspeed?`Speed limit: ${maxspeed}<br>`:'')
                +(direction?`Direction: ${direction}<br>`:'')
                +'<small style="color:#888">OSM Fixed Camera</small>');
            count++;
          }
        });
        status.textContent=`📷 ${count} CAMERAS LOADED · OSM DATA`;
        setTimeout(()=>status.style.opacity='0.4',3000);
      })
      .catch(()=>{
        status.textContent='OFFLINE — CACHED MAP ONLY';
        status.style.color='#ffb700';
      });

    // User location
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(pos=>{
        const latlng=[pos.coords.latitude,pos.coords.longitude];
        if(!map._userMarker){
          map._userMarker=L.circleMarker(latlng,{
            radius:8,color:'#00ff41',fillColor:'#00ff41',
            fillOpacity:0.9,weight:2
          }).addTo(map).bindTooltip('You',{permanent:false});
          // Accuracy circle
          map._accCircle=L.circle(latlng,{
            radius:pos.coords.accuracy,
            color:'#00ff41',fillColor:'#00ff41',
            fillOpacity:0.08,weight:1,dashArray:'4'
          }).addTo(map);
          map.setView(latlng,14);
        } else {
          map._userMarker.setLatLng(latlng);
          map._accCircle.setLatLng(latlng).setRadius(pos.coords.accuracy);
        }
      },{enableHighAccuracy:true,maximumAge:5000});
    }

    // Legend
    const legend=L.control({position:'bottomright'});
    legend.onAdd=()=>{
      const d=L.DomUtil.create('div');
      d.style.cssText='background:rgba(5,8,5,.88);border:1px solid #162016;'
        +'border-radius:4px;padding:6px 8px;font-size:8px;color:#a8c8a8;line-height:1.8;';
      d.innerHTML='<div><span style="color:#00ff41">●</span> You</div>'
        +'<div><span style="color:#ff3d3d">●</span> Fixed Speed Cam</div>'
        +'<div style="color:#555;font-size:7px;margin-top:2px">OSM data · Perth WA</div>';
      return d;
    };
    legend.addTo(map);
  }

  loadLeafletAndInit();
}

// ═══════════════════════
//  INIT
// ═══════════════════════
applyTheme('Matrix');
renderSlots();
renderModeGrid();
drawFrame();
</script>
