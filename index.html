<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DECK</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050805;--surface:#0a0f0a;--panel:#0e150e;--border:#162016;
  --text:#a8c8a8;--muted:#3a5a3a;--amber:#ffb700;--red:#ff3d3d;
  --th-hi:#00ff41;--th-mid:#00cc33;--th-lo:#005c17;--th-bg:#001a07;--th-glow:rgba(0,255,65,0.6);
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
  font-family:'Courier New','Lucida Console',monospace;overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
#root{display:grid;grid-template-rows:44px 1fr 300px;height:100vh}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20}
.logo{font-size:18px;font-weight:900;letter-spacing:6px;color:var(--th-hi);
  text-shadow:0 0 10px var(--th-glow)}
.logo span{color:var(--muted)}
#clock{font-size:16px;letter-spacing:3px;color:var(--th-hi);text-shadow:0 0 10px var(--th-glow)}
.spill{display:flex;align-items:center;gap:6px;padding:3px 10px;
  border:1px solid var(--border);border-radius:20px;font-size:9px;letter-spacing:2px;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--th-hi);
  box-shadow:0 0 6px var(--th-hi);animation:pulse 2s ease-in-out infinite}
.sdot.off{background:var(--muted);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
#main{display:grid;grid-template-columns:160px 1fr 1fr;background:var(--border);gap:1px;overflow:hidden}

/* SLOTS */
#slots{background:var(--surface);display:flex;flex-direction:column;padding:10px 8px;gap:7px;overflow-y:auto}
.shdr{font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;
  padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:2px}
.slot-btn{position:relative;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;padding:10px 6px;background:var(--panel);
  border:1px solid var(--border);border-radius:8px;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;min-height:62px;flex-shrink:0}
.slot-btn:hover,.slot-btn:active{border-color:var(--th-hi);box-shadow:0 0 10px var(--th-glow)}
.slot-btn.active{border-color:var(--amber);box-shadow:0 0 12px rgba(255,183,0,.4)}
.slot-icon{font-size:22px;line-height:1}
.slot-name{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text);text-align:center}
.slot-edit{position:absolute;top:3px;right:4px;font-size:9px;color:var(--muted);
  cursor:pointer;opacity:0;background:none;border:none;padding:2px 4px;
  transition:opacity .15s;font-family:inherit}
.slot-btn:hover .slot-edit{opacity:1}
.slot-edit:hover{color:var(--amber)}

/* WIN PANELS */
.win-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.win-header{display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;gap:6px;overflow-x:auto}
.win-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.pill-row{display:flex;gap:4px;overflow-x:auto}
.pill-row::-webkit-scrollbar{display:none}
.app-pill{padding:3px 9px;font-size:9px;letter-spacing:1px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.app-pill:hover{border-color:var(--th-hi);color:var(--th-hi)}
.app-pill.active{border-color:var(--th-hi);background:rgba(0,255,65,.07);
  color:var(--th-hi);box-shadow:0 0 8px var(--th-glow)}
.win-body{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
iframe.wf{width:100%;height:100%;border:none;display:none}
iframe.wf.on{display:block}
.win-ph{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted)}
.win-ph .phi{font-size:32px;opacity:.2}
.win-ph p{font-size:9px;letter-spacing:2px;text-transform:uppercase}
/* Native app deep-link button */
.open-app-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 20px;border:1px solid var(--border);border-radius:10px;
  background:var(--panel);color:var(--text);cursor:pointer;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;text-decoration:none;
}
.open-app-btn:hover{border-color:var(--th-hi);box-shadow:0 0 12px var(--th-glow)}
.open-app-btn .oai{font-size:36px}
.open-app-btn .oan{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--th-hi)}
.open-app-btn .oah{font-size:8px;letter-spacing:1px;color:var(--muted);text-align:center;max-width:160px}

/* VISUALIZER ZONE */
#viz-zone{background:var(--surface);border-top:1px solid var(--border);
  display:grid;grid-template-columns:155px 1fr 90px;overflow:hidden}

/* VIZ LEFT CONTROLS */
.viz-left{display:flex;flex-direction:column;padding:8px 10px;gap:7px;
  border-right:1px solid var(--border);overflow-y:auto}
.elbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.eq-select{background:var(--panel);border:1px solid var(--border);color:var(--text);
  font-family:'Courier New',monospace;font-size:9px;padding:4px 6px;border-radius:5px;
  cursor:pointer;outline:none;width:100%}
.eq-select:focus{border-color:var(--th-hi)}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.tswatch{padding:3px 4px;font-size:8px;letter-spacing:1px;border-radius:4px;
  border:1px solid var(--border);background:var(--panel);color:var(--muted);
  cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.tswatch:hover{border-color:var(--th-hi);color:var(--th-hi)}
.tswatch.active{border-color:var(--th-hi);color:var(--th-hi);
  box-shadow:0 0 6px var(--th-glow);background:rgba(0,0,0,.4)}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.vizmode{padding:3px 4px;font-size:8px;letter-spacing:1px;text-transform:uppercase;
  border-radius:4px;border:1px solid var(--border);background:var(--panel);
  color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.vizmode:hover{border-color:var(--th-hi);color:var(--th-hi)}
.vizmode.active{border-color:var(--th-hi);color:var(--th-hi);
  background:rgba(0,0,0,.4);box-shadow:0 0 5px var(--th-glow)}
.grow{display:flex;align-items:center;gap:5px}
.grow span{font-size:8px;color:var(--th-hi);min-width:30px;text-align:right}
input[type=range].gslider{-webkit-appearance:none;flex:1;height:3px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range].gslider::-webkit-slider-thumb{-webkit-appearance:none;
  width:12px;height:12px;border-radius:50%;background:var(--th-hi);cursor:pointer;
  box-shadow:0 0 8px var(--th-glow)}
input[type=range].gslider::-webkit-slider-runnable-track{background:var(--border);height:3px;border-radius:2px}

/* SENSITIVITY SLIDER */
.sens-row{display:flex;align-items:center;gap:5px}
.sens-row span{font-size:8px;color:var(--th-hi);min-width:28px;text-align:right}

/* VIZ CENTER CANVAS */
#viz-center{display:flex;flex-direction:column;padding:6px 4px 4px;gap:3px;overflow:hidden;position:relative}
#viz-toprow{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
#viz-toprow span{font-size:8px;letter-spacing:2px;color:var(--muted)}
#viz-canvas{flex:1;display:block;width:100%;border:1px solid var(--border);border-radius:3px}

/* VU RIGHT */
.viz-right{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 10px;border-left:1px solid var(--border)}
.vu-col{display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.vulbl{font-size:8px;letter-spacing:2px;color:var(--muted)}
.vutrack{width:16px;flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.vufill{width:100%;border-radius:2px;transition:height .04s linear}
.vudb{font-size:7px;color:var(--muted)}

/* MODAL */
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:200;align-items:center;justify-content:center}
#modal-ov.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--th-hi);
  box-shadow:0 0 30px var(--th-glow);border-radius:10px;
  padding:18px;min-width:290px;max-width:360px;width:90%}
.modal h3{font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:var(--th-hi);margin-bottom:12px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.mf label{font-size:8px;letter-spacing:2px;color:var(--muted)}
.mf input{background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Courier New',monospace;font-size:11px;
  padding:6px 8px;border-radius:5px;outline:none;width:100%}
.mf input:focus{border-color:var(--th-hi)}
.egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:10px}
.ep{font-size:18px;text-align:center;cursor:pointer;padding:2px;border-radius:4px;
  border:1px solid transparent;transition:all .15s}
.ep:hover,.ep.sel{border-color:var(--th-hi);background:rgba(0,255,65,.1)}
.mbtns{display:flex;gap:7px;justify-content:flex-end}
.mbtn{padding:6px 14px;border-radius:5px;border:none;cursor:pointer;
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;transition:all .15s}
.mok{background:var(--th-hi);color:#000;font-weight:700}
.mok:hover{box-shadow:0 0 10px var(--th-glow)}
.mno{background:transparent;border:1px solid var(--border);color:var(--muted)}
.mno:hover{border-color:var(--muted);color:var(--text)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="root">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">DE<span>::</span>CK</div>
  <div id="clock">--:--:--</div>
  <div class="spill"><div class="sdot off" id="sdot"></div><span id="sstat">OFFLINE</span></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="slots"><div class="shdr">Quick Launch</div></div>
  <!-- WINDOW A -->
  <div class="win-panel">
    <div class="win-header">
      <span class="win-lbl">WIN A</span>
      <div class="pill-row" id="pillsA"></div>
    </div>
    <div class="win-body" id="bodyA">
      <div class="win-ph"><div class="phi">◻</div><p>Select app above</p></div>
    </div>
  </div>
  <!-- WINDOW B -->
  <div class="win-panel">
    <div class="win-header">
      <span class="win-lbl">WIN B</span>
      <div class="pill-row" id="pillsB"></div>
    </div>
    <div class="win-body" id="bodyB">
      <div class="win-ph"><div class="phi">◻</div><p>Select app above</p></div>
    </div>
  </div>
</div>

<!-- VISUALIZER ZONE -->
<div id="viz-zone">

  <!-- LEFT CONTROLS -->
  <div class="viz-left">
    <div class="elbl">Source</div>
    <select class="eq-select" id="srcSel">
      <option value="display">Stereo Out (Capture)</option>
      <option value="bt">Bluetooth</option>
      <option value="aux">AUX In</option>
      <option value="usb">USB Audio</option>
    </select>

    <div class="elbl">Theme</div>
    <div class="tgrid" id="themeGrid"></div>

    <div class="elbl">Visualizer Mode</div>
    <div class="pgrid" id="modeGrid"></div>

    <div class="elbl">Sensitivity</div>
    <div class="sens-row">
      <input type="range" class="gslider" id="sensSlider" min="1" max="8" step="0.1" value="3">
      <span id="sensLbl">3.0x</span>
    </div>

    <div class="elbl">Master Gain</div>
    <div class="grow">
      <input type="range" class="gslider" id="gainSlider" min="0" max="2" step="0.01" value="1">
      <span id="gainLbl">0dB</span>
    </div>
  </div>

  <!-- VIZ CANVAS CENTER -->
  <div id="viz-center">
    <div id="viz-toprow">
      <span id="viz-mode-label">SPECTRUM BARS</span>
      <span id="viz-hint">AUDIO VISUALIZER</span>
    </div>
    <canvas id="viz-canvas"></canvas>
  </div>

  <!-- VU METERS -->
  <div class="viz-right">
    <div class="vu-col">
      <div class="vulbl">L</div>
      <div class="vutrack" id="vuLt"><div class="vufill" id="vuL" style="height:0%"></div></div>
      <div class="vudb" id="vuLdb">—</div>
    </div>
    <div class="vu-col">
      <div class="vulbl">R</div>
      <div class="vutrack" id="vuRt"><div class="vufill" id="vuR" style="height:0%"></div></div>
      <div class="vudb" id="vuRdb">—</div>
    </div>
  </div>

</div><!-- /viz-zone -->
</div><!-- /root -->

<!-- MODAL -->
<div id="modal-ov">
  <div class="modal">
    <h3>Edit Slot</h3>
    <div class="mf"><label>App Name</label><input type="text" id="m-name" placeholder="e.g. Radarbot"></div>
    <div class="mf"><label>URL or App Link</label><input type="text" id="m-url" placeholder="https:// or intent://"></div>
    <div class="mf"><label>Icon</label></div>
    <div class="egrid" id="egrid"></div>
    <div class="mbtns">
      <button class="mbtn mno" id="m-cancel">Cancel</button>
      <button class="mbtn mok" id="m-save">Save</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG DATA
// ══════════════════════════════════════════════

// Apps for window pills — Radarbot, Brave, Waze as primary + extras
// Native Android apps use intent:// deep links which Brave on Android can open
const APPS = [
  {
    id:"radarbot", name:"Radarbot", icon:"📡",
    type:"intent",
    url:"intent://open#Intent;scheme=radarbot;package=com.radarbot.radarbot;end",
    weburl:"https://www.radarbot.com",
    hint:"Opens Radarbot app"
  },
  {
    id:"waze", name:"Waze", icon:"🚗",
    type:"intent",
    url:"waze://",
    weburl:"https://waze.com",
    hint:"Opens Waze navigation"
  },
  {
    id:"brave", name:"Brave", icon:"🦁",
    type:"web",
    url:"https://search.brave.com",
    weburl:"https://search.brave.com",
    hint:"Brave Search"
  },
  {
    id:"maps", name:"Maps", icon:"🗺️",
    type:"web",
    url:"https://maps.google.com",
    weburl:"https://maps.google.com",
    hint:"Google Maps"
  },
  {
    id:"spotify", name:"Music", icon:"🎵",
    type:"intent",
    url:"spotify:",
    weburl:"https://open.spotify.com",
    hint:"Opens Spotify"
  },
  {
    id:"yt", name:"YouTube", icon:"▶",
    type:"web",
    url:"https://www.youtube.com",
    weburl:"https://www.youtube.com",
    hint:"YouTube"
  },
];

const DEFAULT_SLOTS = [
  {name:"Radarbot", icon:"📡", url:"intent://open#Intent;scheme=radarbot;package=com.radarbot.radarbot;end", type:"intent"},
  {name:"Waze",     icon:"🚗", url:"waze://",    type:"intent"},
  {name:"Brave",    icon:"🦁", url:"https://search.brave.com", type:"web"},
  {name:"Music",    icon:"🎵", url:"spotify:",   type:"intent"},
  {name:"Maps",     icon:"🗺️", url:"https://maps.google.com", type:"web"},
];

const EMOJIS=["📡","🚗","🦁","🎵","🗺️","📞","📷","⚙️","▶️","🌤️","📻","🔋","💡","🎙️","🛞","🧭","📱","🔧","🌐","⚡","📶","🔴","🔵","🟢","🟡","🟠","🎮","🏎️"];

const THEMES={
  "Matrix":  {hi:"#00ff41",mid:"#00cc33",lo:"#005c17",glow:"rgba(0,255,65,.6)"},
  "Cyan":    {hi:"#00d4ff",mid:"#0099cc",lo:"#003d55",glow:"rgba(0,212,255,.6)"},
  "Amber":   {hi:"#ffb700",mid:"#cc8800",lo:"#553a00",glow:"rgba(255,183,0,.6)"},
  "Plasma":  {hi:"#ff00ff",mid:"#cc00cc",lo:"#550055",glow:"rgba(255,0,255,.6)"},
  "Rainbow": {hi:"RAINBOW",mid:"",lo:"",glow:"rgba(255,255,255,.3)"},
  "Inferno": {hi:"#ff4400",mid:"#cc2200",lo:"#550a00",glow:"rgba(255,68,0,.6)"},
};

const VIZ_MODES=["Bars","Blocks","Wave","Mirror","Circle","Scope"];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let slots=JSON.parse(localStorage.getItem('deck-slots-v4')||'null')||DEFAULT_SLOTS;
let activeTheme='Matrix';
let vizMode='Blocks';
let editSlot=null;
let selEmoji='📡';
let winAId=null,winBId=null;
let audioCtx=null,analyserL=null,analyserR=null,gainNode=null;
let masterGain=1;
let sensitivity=3.0;
let animFrame=null;

// ══════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════
(function tick(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-AU',{hour12:false});
  setTimeout(tick,1000);
})();

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
function applyTheme(name){
  activeTheme=name;
  const t=THEMES[name];
  const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  const r=document.documentElement.style;
  r.setProperty('--th-hi',hi);
  r.setProperty('--th-mid',t.mid||'#00cc33');
  r.setProperty('--th-lo',t.lo||'#005c17');
  r.setProperty('--th-glow',t.glow);
  renderThemeGrid();
}
function renderThemeGrid(){
  const g=document.getElementById('themeGrid');g.innerHTML='';
  Object.keys(THEMES).forEach(n=>{
    const t=THEMES[n];const hi=t.hi==='RAINBOW'?'#ff88ff':t.hi;
    const b=document.createElement('button');
    b.className='tswatch'+(n===activeTheme?' active':'');
    b.textContent=n;
    b.style.setProperty('--th-hi',hi);b.style.setProperty('--th-glow',t.glow);
    b.onclick=()=>applyTheme(n);g.appendChild(b);
  });
}

// ══════════════════════════════════════════════
//  VIZ MODES
// ══════════════════════════════════════════════
function renderModeGrid(){
  const g=document.getElementById('modeGrid');g.innerHTML='';
  VIZ_MODES.forEach(m=>{
    const b=document.createElement('button');
    b.className='vizmode'+(m===vizMode?' active':'');
    b.textContent=m;
    b.onclick=()=>{vizMode=m;renderModeGrid();document.getElementById('viz-mode-label').textContent=m.toUpperCase()+' VIZ';};
    g.appendChild(b);
  });
}

// ══════════════════════════════════════════════
//  SLOTS
// ══════════════════════════════════════════════
function saveSlots(){localStorage.setItem('deck-slots-v4',JSON.stringify(slots));}
function renderSlots(){
  const c=document.getElementById('slots');
  c.querySelectorAll('.slot-btn').forEach(e=>e.remove());
  slots.forEach((s,i)=>{
    const d=document.createElement('div');d.className='slot-btn';
    d.innerHTML=`<button class="slot-edit">✎</button><div class="slot-icon">${s.icon}</div><div class="slot-name">${s.name}</div>`;
    d.addEventListener('click',e=>{
      if(e.target.classList.contains('slot-edit')){openModal(i);return;}
      launchSlot(s,i);
    });
    c.appendChild(d);
  });
}
function launchSlot(s,i){
  if(!s.url){openModal(i);return;}
  if(!winAId)setWin('A',s);else setWin('B',s);
  document.querySelectorAll('.slot-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
}

// ══════════════════════════════════════════════
//  WINDOWS — handles both web URLs and intent:// deep links
// ══════════════════════════════════════════════
function buildPills(win){
  const c=document.getElementById('pills'+win);c.innerHTML='';
  APPS.forEach(app=>{
    const p=document.createElement('div');p.className='app-pill';
    p.textContent=app.icon+' '+app.name;p.dataset.id=app.id;
    p.onclick=()=>setWin(win,app);c.appendChild(p);
  });
}

function setWin(win,app){
  const body=document.getElementById('body'+win);
  body.innerHTML='';
  if(win==='A')winAId=app.id;else winBId=app.id;

  // Native intent:// or custom scheme — can't iframe, show tap-to-open button
  const isNative = app.type==='intent'||
    (app.url&&!app.url.startsWith('http')&&!app.url.startsWith('//'));

  if(isNative){
    // Try to open the app via link, show a tap button in the panel
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:12px;';

    const a=document.createElement('a');
    a.className='open-app-btn';
    a.href=app.url||app.weburl;
    // On Android Brave, intent:// links open the target app
    a.rel='noopener';
    a.innerHTML=`<div class="oai">${app.icon}</div>
      <div class="oan">Open ${app.name}</div>
      <div class="oah">${app.hint||'Tap to launch'}</div>`;
    wrap.appendChild(a);

    // Web fallback button
    if(app.weburl){
      const fb=document.createElement('a');
      fb.className='open-app-btn';
      fb.href=app.weburl;
      fb.style.marginTop='0';fb.style.padding='8px 14px';
      fb.innerHTML=`<div class="oan" style="font-size:8px">🌐 Open Web Version</div>`;
      wrap.appendChild(fb);
    }
    body.appendChild(wrap);
  } else {
    if(!app.url&&!app.weburl){
      body.innerHTML='<div class="win-ph"><div class="phi">✕</div><p>No URL set</p></div>';
      return;
    }
    const f=document.createElement('iframe');f.className='wf on';
    f.src=app.url||app.weburl;
    f.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
    body.appendChild(f);
  }
  document.querySelectorAll('#pills'+win+' .app-pill').forEach(p=>
    p.classList.toggle('active',p.dataset.id===app.id));
}
buildPills('A');buildPills('B');

// ══════════════════════════════════════════════
function openModal(i){
  editSlot=i;const s=slots[i];
  document.getElementById('m-name').value=s.name;
  document.getElementById('m-url').value=s.url;
  selEmoji=s.icon;renderEmojiGrid();
  document.getElementById('modal-ov').classList.add('open');
}
function renderEmojiGrid(){
  const g=document.getElementById('egrid');g.innerHTML='';
  EMOJIS.forEach(e=>{
    const d=document.createElement('div');d.className='ep'+(e===selEmoji?' sel':'');
    d.textContent=e;d.onclick=()=>{selEmoji=e;renderEmojiGrid();};g.appendChild(d);
  });
}
document.getElementById('m-cancel').onclick=()=>document.getElementById('modal-ov').classList.remove('open');
document.getElementById('m-save').onclick=()=>{
  const url=document.getElementById('m-url').value;
  const isNative=url&&!url.startsWith('http')&&!url.startsWith('//');
  slots[editSlot]={name:document.getElementById('m-name').value||'App',icon:selEmoji,url:url,type:isNative?'intent':'web'};
  saveSlots();renderSlots();document.getElementById('modal-ov').classList.remove('open');
};

// ══════════════════════════════════════════════
//  GAIN + SENSITIVITY
// ══════════════════════════════════════════════
document.getElementById('gainSlider').addEventListener('input',e=>{
  masterGain=parseFloat(e.target.value);
  const db=(20*Math.log10(Math.max(0.001,masterGain))).toFixed(1);
  document.getElementById('gainLbl').textContent=(db>=0?'+':'')+db+'dB';
  if(gainNode)gainNode.gain.value=masterGain;
});
document.getElementById('sensSlider').addEventListener('input',e=>{
  sensitivity=parseFloat(e.target.value);
  document.getElementById('sensLbl').textContent=sensitivity.toFixed(1)+'x';
});

// ══════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════
async function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    gainNode=audioCtx.createGain();gainNode.gain.value=masterGain;
    const splitter=audioCtx.createChannelSplitter(2);
    analyserL=audioCtx.createAnalyser();analyserL.fftSize=2048;analyserL.smoothingTimeConstant=0.8;
    analyserR=audioCtx.createAnalyser();analyserR.fftSize=2048;analyserR.smoothingTimeConstant=0.8;
    gainNode.connect(splitter);
    splitter.connect(analyserL,0);splitter.connect(analyserR,1);
    analyserL.connect(audioCtx.destination);
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({audio:true,video:false});
      const src=audioCtx.createMediaStreamSource(stream);
      src.connect(gainNode);
      document.getElementById('sstat').textContent='STEREO ACTIVE';
      document.getElementById('sdot').classList.remove('off');
    }catch{
      // Demo: generate oscillating tones so visualizer works
      const osc1=audioCtx.createOscillator();osc1.type='sawtooth';osc1.frequency.value=110;
      const osc2=audioCtx.createOscillator();osc2.type='square';osc2.frequency.value=220;
      const og=audioCtx.createGain();og.gain.value=0.05;
      osc1.connect(og);osc2.connect(og);og.connect(gainNode);
      osc1.start();osc2.start();
      document.getElementById('sstat').textContent='DEMO MODE';
    }
  }catch(err){console.error('Audio:',err);}
}

// ══════════════════════════════════════════════
//  VISUALIZER DRAW
// ══════════════════════════════════════════════
const cvs=document.getElementById('viz-canvas');
const ctx=cvs.getContext('2d');
let freqBuf=null,timeBuf=null;
let demoPhase=0;

function getThemeColor(i,total){
  const t=THEMES[activeTheme];
  if(t.hi==='RAINBOW'){
    const hue=Math.round((i/total)*300);
    return{hi:`hsl(${hue},100%,55%)`,glow:`hsl(${hue},100%,70%)`};
  }
  return{hi:t.hi,glow:(t.hi)};
}

function drawViz(){
  animFrame=requestAnimationFrame(drawViz);
  const W=cvs.width=cvs.offsetWidth||600;
  const H=cvs.height=cvs.offsetHeight||220;
  ctx.clearRect(0,0,W,H);

  // Get audio data or generate demo data
  let freq,time;
  if(analyserL){
    if(!freqBuf||freqBuf.length!==analyserL.frequencyBinCount){
      freqBuf=new Uint8Array(analyserL.frequencyBinCount);
      timeBuf=new Uint8Array(analyserL.fftSize);
    }
    analyserL.getByteFrequencyData(freqBuf);
    analyserL.getByteTimeDomainData(timeBuf);
    freq=freqBuf;time=timeBuf;
  }else{
    // animated demo data
    demoPhase+=0.04;
    const flen=512,tlen=1024;
    freq=new Uint8Array(flen);time=new Uint8Array(tlen);
    for(let i=0;i<flen;i++){
      const base=Math.max(0,180-i*0.28);
      freq[i]=Math.max(0,Math.min(255,base+Math.sin(demoPhase*2+i*0.1)*40+Math.random()*20));
    }
    for(let i=0;i<tlen;i++){
      time[i]=128+Math.sin(demoPhase*3+i*0.05)*60+Math.sin(demoPhase*7+i*0.02)*20;
    }
  }

  switch(vizMode){
    case'Bars':    drawBars(ctx,W,H,freq);break;
    case'Blocks':  drawBlocks(ctx,W,H,freq);break;
    case'Wave':    drawWave(ctx,W,H,time);break;
    case'Mirror':  drawMirror(ctx,W,H,freq);break;
    case'Circle':  drawCircle(ctx,W,H,freq);break;
    case'Scope':   drawScope(ctx,W,H,time);break;
  }

  // VU
  updateVU(freq);
}

function drawBars(cx,W,H,freq){
  const bins=80;
  const step=Math.floor(freq.length/bins);
  const bw=W/bins;
  for(let i=0;i<bins;i++){
    let sum=0;for(let j=0;j<step;j++)sum+=freq[i*step+j];
    const val=(sum/step/255)*sensitivity;
    const h=Math.min(H-2,val*H);
    const col=getThemeColor(i,bins);
    const grad=cx.createLinearGradient(0,H-h,0,H);
    const t=THEMES[activeTheme];
    grad.addColorStop(0,col.hi);
    grad.addColorStop(1,t.lo||'#001a07');
    cx.fillStyle=grad;
    cx.shadowColor=col.glow;cx.shadowBlur=4;
    cx.fillRect(i*bw+1,H-h,bw-2,h);
    cx.shadowBlur=0;
  }
}

function drawBlocks(cx,W,H,freq){
  const bins=60;
  const step=Math.floor(freq.length/bins);
  const bw=W/bins;
  const BH=5,BG=2,BS=BH+BG;
  const totalBlocks=Math.floor(H/BS);
  for(let i=0;i<bins;i++){
    let sum=0;for(let j=0;j<step;j++)sum+=freq[i*step+j];
    const val=(sum/step/255)*sensitivity;
    const litBlocks=Math.min(totalBlocks,Math.round(val*totalBlocks));
    const col=getThemeColor(i,bins);
    for(let b=0;b<totalBlocks;b++){
      const by=H-(b+1)*BS;
      const frac=b/totalBlocks;
      if(b<litBlocks){
        const alpha=0.4+frac*0.6;
        cx.globalAlpha=alpha;
        cx.shadowColor=col.glow;cx.shadowBlur=b>litBlocks*0.8?8:3;
        cx.fillStyle=col.hi;
        cx.fillRect(i*bw+1.5,by,bw-3,BH);
        cx.shadowBlur=0;cx.globalAlpha=1;
      }else{
        cx.fillStyle=THEMES[activeTheme].lo||'#001a07';
        cx.globalAlpha=0.25;
        cx.fillRect(i*bw+1.5,by,bw-3,BH);
        cx.globalAlpha=1;
      }
    }
    // Peak dot
    const peakY=H-(litBlocks+1)*BS;
    if(litBlocks>0&&peakY>0){
      cx.fillStyle=col.hi;cx.shadowColor=col.glow;cx.shadowBlur=10;
      cx.fillRect(i*bw+1.5,peakY,bw-3,BH);cx.shadowBlur=0;
    }
  }
}

function drawWave(cx,W,H,time){
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  cx.beginPath();cx.strokeStyle=hi;cx.lineWidth=2;
  cx.shadowColor=hi;cx.shadowBlur=6;
  const step=W/time.length;
  for(let i=0;i<time.length;i++){
    const y=((time[i]-128)/128)*((H/2)*sensitivity*0.4)+H/2;
    i===0?cx.moveTo(0,y):cx.lineTo(i*step,y);
  }
  cx.stroke();cx.shadowBlur=0;
  // fill under
  const grad=cx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,hi.replace(')',',0.15)').replace('rgb','rgba').replace('#',
    (c)=>{const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
    return`rgba(${r},${g},${b},`})+'0.02)');
  // simpler fill
  cx.strokeStyle='transparent';
  cx.fillStyle=hi+'22';
  cx.fill();
}

function drawMirror(cx,W,H,freq){
  const bins=60;
  const step=Math.floor(freq.length/bins);
  const bw=W/bins;
  const mid=H/2;
  for(let i=0;i<bins;i++){
    let sum=0;for(let j=0;j<step;j++)sum+=freq[i*step+j];
    const val=(sum/step/255)*sensitivity;
    const h=Math.min(mid-2,val*mid);
    const col=getThemeColor(i,bins);
    const grad=cx.createLinearGradient(0,mid-h,0,mid+h);
    const t=THEMES[activeTheme];
    grad.addColorStop(0,t.lo||'#001a07');
    grad.addColorStop(0.5,col.hi);
    grad.addColorStop(1,t.lo||'#001a07');
    cx.fillStyle=grad;
    cx.shadowColor=col.glow;cx.shadowBlur=3;
    cx.fillRect(i*bw+1,mid-h,bw-2,h*2);
    cx.shadowBlur=0;
  }
  // center line
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  cx.strokeStyle=hi+'44';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,mid);cx.lineTo(W,mid);cx.stroke();
}

function drawCircle(cx,W,H,freq){
  const CX=W/2,CY=H/2;
  const R=Math.min(W,H)*0.28;
  const bins=120;
  const step=Math.floor(freq.length/bins);
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  // base circle
  cx.beginPath();cx.arc(CX,CY,R,0,Math.PI*2);
  cx.strokeStyle=hi+'33';cx.lineWidth=1;cx.stroke();
  for(let i=0;i<bins;i++){
    let sum=0;for(let j=0;j<step;j++)sum+=freq[i*step+j];
    const val=(sum/step/255)*sensitivity;
    const angle=(i/bins)*Math.PI*2-Math.PI/2;
    const inner=R;
    const outer=R+val*R*0.9;
    const col=getThemeColor(i,bins);
    cx.beginPath();
    cx.moveTo(CX+Math.cos(angle)*inner,CY+Math.sin(angle)*inner);
    cx.lineTo(CX+Math.cos(angle)*outer,CY+Math.sin(angle)*outer);
    cx.strokeStyle=col.hi;cx.lineWidth=2.5;
    cx.shadowColor=col.glow;cx.shadowBlur=4;
    cx.stroke();cx.shadowBlur=0;
  }
}

function drawScope(cx,W,H,time){
  // Oscilloscope — both channels overlaid
  const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
  const mid=t.mid||'#00cc33';
  // channel L
  cx.beginPath();cx.strokeStyle=hi;cx.lineWidth=1.5;cx.shadowColor=hi;cx.shadowBlur=5;
  const step=W/time.length;
  for(let i=0;i<time.length;i++){
    const y=((time[i]-128)/128)*(H/2*sensitivity*0.35)+H/2;
    i===0?cx.moveTo(0,y):cx.lineTo(i*step,y);
  }
  cx.stroke();cx.shadowBlur=0;
  // grid
  cx.strokeStyle=hi+'18';cx.lineWidth=1;
  [0.25,0.5,0.75].forEach(f=>{
    cx.beginPath();cx.moveTo(0,f*H);cx.lineTo(W,f*H);cx.stroke();
    cx.beginPath();cx.moveTo(f*W,0);cx.lineTo(f*W,H);cx.stroke();
  });
}

function updateVU(freq){
  if(!freq){return;}
  const half=Math.floor(freq.length/2);
  let sumL=0,sumR=0;
  for(let i=0;i<half;i++){sumL+=freq[i]*freq[i];}
  for(let i=half;i<freq.length;i++){sumR+=freq[i]*freq[i];}
  const rmsL=Math.sqrt(sumL/half)/255;
  const rmsR=Math.sqrt(sumR/half)/255;
  const pL=Math.min(100,rmsL*sensitivity*200);
  const pR=Math.min(100,rmsR*sensitivity*200);
  function vuCol(p){
    const t=THEMES[activeTheme];const hi=t.hi==='RAINBOW'?'#00ff41':t.hi;
    if(p>90)return'#ff3d3d';if(p>70)return t.mid||'#ffb700';return hi;
  }
  const vL=document.getElementById('vuL');vL.style.height=pL+'%';vL.style.background=vuCol(pL);
  const vR=document.getElementById('vuR');vR.style.height=pR+'%';vR.style.background=vuCol(pR);
  const dL=rmsL>0?Math.max(-60,20*Math.log10(rmsL)):-Infinity;
  const dR=rmsR>0?Math.max(-60,20*Math.log10(rmsR)):-Infinity;
  document.getElementById('vuLdb').textContent=isFinite(dL)?dL.toFixed(0):'—';
  document.getElementById('vuRdb').textContent=isFinite(dR)?dR.toFixed(0):'—';
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
applyTheme('Matrix');
renderSlots();
renderModeGrid();
drawViz();  // starts the loop (demo mode until audio)

document.addEventListener('click',()=>{
  if(!audioCtx)initAudio();
  else if(audioCtx.state==='suspended')audioCtx.resume();
});

document.getElementById('srcSel').addEventListener('change',()=>{
  if(audioCtx){audioCtx.close();audioCtx=null;analyserL=null;analyserR=null;}
  initAudio();
});

window.addEventListener('resize',()=>{/* canvas auto-resizes in draw loop */});
</script>
